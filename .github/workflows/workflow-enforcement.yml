name: Workflow Enforcement & Deployment

on:
  push:
    branches:
      - development
      - master
  pull_request:
    branches:
      - master
      - development

env:
  NODE_VERSION: "18"

jobs:
  # Job 1: Prevent direct pushes to master
  validate-branch-protection:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Check branch protection
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "❌ ERROR: Direct push to master detected!"
            echo "Workflow: development → PR → master (via GitHub)"
            exit 1
          fi
          echo "✅ Push to ${{ github.ref }} allowed"

  # Job 2: Run tests on all commits to development and PRs to master
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for required environment files
        run: |
          if [ "${{ github.ref }}" = "refs/heads/development" ] || [ "${{ github.base_ref }}" = "development" ]; then
            echo "ℹ️  Running on development branch"
            echo "Make sure .env.development is set in your local environment"
          fi
          if [ "${{ github.base_ref }}" = "master" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "ℹ️  Changes targeting or on master branch"
            echo "Ensure all testing is complete before merging"
          fi

      - name: Build application
        run: npm run build
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          REACT_APP_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}

      - name: Run ESLint (if configured)
        run: npm run lint 2>/dev/null || echo "ℹ️  No lint script configured"

      - name: Verify build output
        run: |
          if [ -d "build" ]; then
            echo "✅ Build successful"
            ls -la build/ | head -10
          else
            echo "❌ Build failed - no build directory"
            exit 1
          fi

  # Job 3: Auto-deploy master to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          REACT_APP_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          channelId: live
          projectId: fitness-tracker573

      - name: Post deployment notification
        run: |
          echo "✅ Production deployment successful!"
          echo "🚀 App deployed to: https://fitness-tracker573.web.app"

  # Job 4: Verify PR is coming from development (not master)
  validate-pr-source:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR source branch
        run: |
          if [ "${{ github.head_ref }}" = "master" ]; then
            echo "❌ ERROR: PR source branch is master"
            echo "PRs should originate from feature branches off development"
            exit 1
          fi
          echo "✅ PR from valid branch: ${{ github.head_ref }}"

      - name: Ensure PR targets master
        run: |
          if [ "${{ github.base_ref }}" != "master" ]; then
            echo "⚠️  WARNING: PR targets ${{ github.base_ref }} instead of master"
            echo "Development merges should target master for production release"
          else
            echo "✅ PR correctly targets master for production deployment"
          fi
